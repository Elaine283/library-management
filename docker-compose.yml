version: '3.9'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Load from .env file (create .env in project root with real credentials)
      DB_URL: jdbc:mysql://library-db-portfolio.cnciwacas5l1.ap-northeast-1.rds.amazonaws.com:3306/library_db?useSSL=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped
