# ==========================================
# 伺服器埠號設定
# ==========================================
server.port=8080

# ==========================================
# 資料庫連線設定 (AWS RDS MySQL)
# ==========================================
# 指定 MySQL 8.0+ 的驅動程式
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 資料庫連線 URL (包含時區與金鑰擷取設定，非常正確)
spring.datasource.url=jdbc:mysql://library-db-portfolio.cnciwacas5l1.ap-northeast-1.rds.amazonaws.com:3306/library_db?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true

# 資料庫登入帳號與密碼
spring.datasource.username=admin
spring.datasource.password=elaine1031

# ==========================================
# JPA / Hibernate 自動配置 (取代原本的排除設定)
# ==========================================
# 讓 Spring Boot 自動根據實體類別 (Entity) 更新 AWS 資料庫的資料表結構
spring.jpa.hibernate.ddl-auto=update

# 允許在終端機 (Console) 印出完整的 SQL 執行語法，方便檢查有沒有成功撈到書
spring.jpa.show-sql=true

# ==========================================
# 錯誤處理設定
# ==========================================
# 當發生錯誤時，在回應中包含詳細的錯誤訊息，方便前端除錯
server.error.include-message=always
