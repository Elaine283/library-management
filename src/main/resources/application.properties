# Spring Boot 應用配置
spring.application.name=library-management

# ==========================================
# 伺服器配置
# ==========================================
server.port=8080
server.servlet.context-path=/api

# ==========================================
# 手動 JDBC 連線參數設定（使用環境變數注入）
# 注意：不使用 Spring Boot 預設的 HikariCP 連線池
# 透過 DriverManager 手動控管原生 Connection 物件
# ==========================================
db.url=${DB_URL:jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4}
db.username=${DB_USERNAME:root}
db.password=${DB_PASSWORD:root}

# ==========================================
# JPA 配置
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.use-new-id-generator-mappings=false

# ==========================================
# 日誌配置
# ==========================================
logging.level.root=INFO
logging.level.com.example.library=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# 字符集配置
# ==========================================
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
